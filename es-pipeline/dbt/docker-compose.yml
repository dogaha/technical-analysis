services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5432:5432"
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.latest
    env_file:
      - .env
    volumes:
      - ./project/my_project:/usr/app/dbt
      - ./profiles.yml:/root/.dbt/profiles.yml
    working_dir: /usr/app/dbt
    depends_on:
      - postgres
    entrypoint: ["tail", "-f", "/dev/null"]